<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie App - DAG 2</title>
    <link rel="stylesheet" href="css/app.css" />
    <script src="js/app.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Movie App</h1>
      <p>DAG 2: Arrays, Loops & Film-lister</p>
    </header>

    <main>
      <section class="controls">
        <div class="control-group">
          <label for="search-input">Søg på titel</label>
          <input
            type="text"
            id="search-input"
            placeholder="Fx matrix, dune eller dark"
          />
        </div>

        <div class="control-group">
          <label for="genre-select">Genre</label>
          <select id="genre-select">
            <option value="all">Alle genrer</option>
          </select>
        </div>
      </section>

      <section id="movie-list" class="movie-grid" aria-label="Filmliste">
        <!-- Cards are going to be added in -->
      </section>
    </main>
  </body>
</html>
